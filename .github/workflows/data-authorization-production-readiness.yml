name: Data Authorization — Production Readiness CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docs/architecture/data-auth-monitoring-ci-2026-07.md'
      - 'docs/runbooks/data-authorization-*.md'
      - '.github/workflows/data-authorization-production-readiness.yml'
  push:
    branches:
      - main
      - 'cursor/data-auth-*'

concurrency:
  group: data-auth-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://synqdrive:synqdrive@127.0.0.1:5432/synqdrive?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  DATA_AUTH_POSTGRES_INTEGRATION: '1'

jobs:
  install-lockfile:
    name: Install (lockfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Backend npm ci
        working-directory: backend
        run: npm ci
      - name: Frontend npm ci
        working-directory: frontend
        run: npm ci

  lint:
    name: Lint
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run lint:all
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint:all
        working-directory: frontend

  typecheck:
    name: Typecheck
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci && npx tsc --noEmit -p tsconfig.json
        working-directory: backend
      - run: npm ci && npx tsc -b
        working-directory: frontend

  prisma-validate:
    name: Prisma validate
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: bash scripts/test/verify-prisma-migration-timestamps.sh
        working-directory: backend
      - run: npm run prisma:validate
        working-directory: backend

  migration-tests:
    name: Migration tests (PostgreSQL)
    needs: install-lockfile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: synqdrive
          POSTGRES_PASSWORD: synqdrive
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synqdrive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci && npx prisma generate
        working-directory: backend
      - name: Run empty + legacy migration tests
        working-directory: backend
        run: bash scripts/test/data-auth-migration-test.sh all

  backend-unit:
    name: Backend unit tests
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci && npx prisma generate
        working-directory: backend
      - run: npm run test:data-auth:verify:unit
        working-directory: backend

  backend-integration:
    name: Backend integration tests
    needs: install-lockfile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: synqdrive
          POSTGRES_PASSWORD: synqdrive
          POSTGRES_DB: synqdrive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synqdrive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci && npx prisma generate && npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://synqdrive:synqdrive@127.0.0.1:5432/synqdrive?schema=public
      - run: npm run test:data-auth:postgres
        working-directory: backend
        env:
          DATABASE_URL: postgresql://synqdrive:synqdrive@127.0.0.1:5432/synqdrive?schema=public

  backend-security:
    name: Backend security tests
    needs: install-lockfile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: synqdrive
          POSTGRES_PASSWORD: synqdrive
          POSTGRES_DB: synqdrive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synqdrive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci && npx prisma generate && npx prisma migrate deploy
        working-directory: backend
      - run: DATA_AUTH_POSTGRES_INTEGRATION=1 npm test -- data-auth-security-negative.postgres.integration
        working-directory: backend
        env:
          DATABASE_URL: postgresql://synqdrive:synqdrive@127.0.0.1:5432/synqdrive?schema=public

  enforcement-coverage:
    name: Enforcement coverage check
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci && npx prisma generate
        working-directory: backend
      - run: bash scripts/test/data-auth-production-safety-check.sh
        working-directory: backend

  monitoring-verify:
    name: Monitoring artifacts verify
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: bash scripts/test/verify-data-auth-monitoring.sh
        working-directory: backend

  frontend-component:
    name: Frontend component tests
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test:data-auth
        working-directory: frontend

  playwright-e2e:
    name: Playwright E2E
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:data-processing:e2e
        working-directory: frontend
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: data-auth-playwright-artifacts
          path: |
            frontend/playwright-report/**
            frontend/test-results/**
            frontend/e2e/artifacts/**
          retention-days: 14

  accessibility:
    name: Accessibility (axe)
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npx playwright test -c e2e/playwright.config.ts data-processing-a11y.spec.ts --project=desktop-1280
        working-directory: frontend
        env:
          CI: 'true'

  production-build:
    name: Production build
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci && npx prisma generate && npm run build
        working-directory: backend
      - run: npm ci && npm run build
        working-directory: frontend

  security-scan:
    name: Security / dependency scan
    needs: install-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: bash scripts/audits/audit-dependencies.sh

  ci-gate:
    name: CI gate (all critical jobs)
    runs-on: ubuntu-latest
    needs:
      - install-lockfile
      - lint
      - typecheck
      - prisma-validate
      - migration-tests
      - backend-unit
      - backend-integration
      - backend-security
      - enforcement-coverage
      - monitoring-verify
      - frontend-component
      - playwright-e2e
      - accessibility
      - production-build
      - security-scan
    steps:
      - run: echo "All critical data-authorization CI gates passed."
