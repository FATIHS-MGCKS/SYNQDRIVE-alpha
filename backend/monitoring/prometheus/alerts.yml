# SynqDrive Prometheus alert rules
#
# Low-cardinality operational signals only — no vehicle/trip/org/customer labels.
# Tune `for` durations and thresholds per tenant volume in production.

groups:
  - name: synqdrive_availability
    rules:
      - alert: SynqDriveMetricsScrapeDown
        expr: up{job="synqdrive-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: SynqDrive backend metrics scrape is down
          description: Prometheus cannot scrape GET /api/v1/metrics for job synqdrive-backend.

  - name: synqdrive_clickhouse
    rules:
      - alert: ClickHouseConfiguredUnavailable
        expr: synqdrive_clickhouse_configured == 1 and synqdrive_clickhouse_available == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ClickHouse configured but unreachable
          description: CLICKHOUSE_URL is set but the backend reports ClickHouse unavailable.

      - alert: ClickHouseSchemaError
        expr: synqdrive_clickhouse_schema_status == 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: ClickHouse schema/migration error
          description: ClickHouse schema status is schema_error (code 2). Check migration logs.

      - alert: ClickHouseMirrorWritesFailing
        expr: |
          rate(synqdrive_clickhouse_mirror_writes_total{result="error"}[15m]) > 0
          and rate(synqdrive_clickhouse_mirror_writes_total{result="success"}[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: ClickHouse mirror writes failing
          description: Mirror write errors without successful writes in the last 15 minutes.

      - alert: HfMirrorEnabledNoRecentWrites
        expr: |
          synqdrive_hf_mirror_enabled == 1
          and increase(synqdrive_clickhouse_hf_points_inserted_total[2h]) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: HF mirror enabled but no HF points inserted recently
          description: HF_MIRROR_ENABLED is on but no telemetry_hf_points inserts in 2h (may be idle fleet).

  - name: synqdrive_workers
    rules:
      - alert: QueueLagHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, queue) (rate(synqdrive_queue_lag_seconds_bucket[10m]))
          ) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: BullMQ queue lag is high
          description: P95 queue lag exceeds 5 minutes for at least one monitored queue.

      - alert: QueueFailedJobsHigh
        expr: synqdrive_queue_failed_jobs > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: BullMQ failed job count is elevated
          description: One or more monitored queues have more than 10 failed jobs.

      - alert: TripEnrichmentPendingHigh
        expr: synqdrive_enrichment_pending > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Many trips pending behavior enrichment
          description: synqdrive_enrichment_pending gauge exceeds 50 for 15 minutes.

      - alert: DimoSnapshotSuccessRateLow
        expr: |
          (
            rate(synqdrive_dimo_snapshot_poll_total{result="success"}[30m])
            /
            (
              rate(synqdrive_dimo_snapshot_poll_total{result="success"}[30m])
              + rate(synqdrive_dimo_snapshot_poll_total{result="failure"}[30m])
            )
          ) < 0.8
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: DIMO snapshot poll success rate below 80%
          description: Snapshot worker success ratio dropped — check DIMO connectivity and queue health.

  - name: synqdrive_document_extraction
    rules:
      - alert: DocumentExtractionQueueAgeHigh
        expr: synqdrive_document_extraction_queue_age_seconds > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Document extraction queue age is high
          description: Oldest waiting document.extraction job exceeds 10 minutes.

      - alert: DocumentExtractionOcrFailureRateHigh
        expr: |
          (
            rate(synqdrive_document_extraction_failures_total{stage="OCR",retryable="false"}[15m])
            /
            clamp_min(rate(synqdrive_document_extraction_jobs_total[15m]), 0.001)
          ) > 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Elevated permanent OCR failure rate
          description: More than 25% of document jobs are failing permanently at OCR.

      - alert: DocumentExtractionOcrRateLimited
        expr: rate(synqdrive_document_extraction_failures_total{stage="OCR",error_code="OCR_RATE_LIMITED"}[10m]) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Sustained Mistral OCR 429 rate
          description: OCR rate-limit errors are occurring frequently — check provider quota/backoff.

      - alert: DocumentExtractionWorkersIdleWithQueue
        expr: |
          synqdrive_document_extraction_queue_age_seconds > 120
          and synqdrive_document_extraction_active_jobs == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Document extraction queue stalled
          description: Jobs are waiting but no active workers are processing document.extraction.

      - alert: DocumentExtractionApplyFailureRateHigh
        expr: |
          (
            rate(synqdrive_document_extraction_apply_total{result="error"}[30m])
            /
            clamp_min(rate(synqdrive_document_extraction_apply_total[30m]), 0.001)
          ) > 0.15
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Document apply failure rate elevated
          description: More than 15% of confirm→apply operations are failing.

      - alert: DocumentExtractionAwaitingTypeBacklog
        expr: increase(synqdrive_document_extraction_jobs_total{status="AWAITING_DOCUMENT_TYPE"}[1h]) > 20
        for: 30m
        labels:
          severity: info
        annotations:
          summary: Many documents awaiting manual type selection
          description: AUTO classification could not proceed — operators may need to review type backlog.

      - alert: DocumentExtractionStorageFailures
        expr: rate(synqdrive_document_extraction_failures_total{stage="STORAGE"}[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Document storage read/write failures detected
          description: Storage failures in the document extraction pipeline — check object storage health.

  - name: synqdrive_document_intake_v2
    rules:
      - alert: DocumentIntakeUploadRejectionRateHigh
        expr: |
          sum(rate(synqdrive_document_upload_rejected_total[15m]))
          /
          clamp_min(
            sum(rate(synqdrive_document_upload_total[15m]))
            + sum(rate(synqdrive_document_upload_rejected_total[15m])),
            0.001
          ) > 0.35
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Document upload rejection rate above 35%
          description: Check rate limits, duplicate policy, malware scan, and identification errors.

      - alert: DocumentIntakeOcrFailureRateHigh
        expr: |
          sum(rate(synqdrive_document_ocr_failed_total{retryable="false"}[15m]))
          /
          clamp_min(sum(rate(synqdrive_document_ocr_total[15m])), 0.001) > 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Document Intake V2 permanent OCR failure rate elevated
          description: More than 25% of OCR attempts are failing permanently.

      - alert: DocumentIntakePartialApplyRateHigh
        expr: |
          sum(rate(synqdrive_document_partial_apply_total[30m]))
          /
          clamp_min(sum(rate(synqdrive_document_action_plan_total{outcome="completed"}[30m])), 0.001) > 0.2
        for: 30m
        labels:
          severity: info
        annotations:
          summary: Elevated partial apply rate in document intake
          description: Optional action failures or partial lifecycles exceed 20% of completed plans.

      - alert: DocumentIntakeDuplicateBlockRateHigh
        expr: |
          sum(rate(synqdrive_document_duplicate_total{outcome="blocked"}[1h]))
          /
          clamp_min(sum(rate(synqdrive_document_upload_total[1h])), 0.001) > 0.5
        for: 30m
        labels:
          severity: info
        annotations:
          summary: High blocked duplicate upload rate
          description: More than half of upload attempts are blocked as exact duplicates.

  - name: synqdrive_notifications
    rules:
      - alert: NotificationDeliveryBacklogHigh
        expr: synqdrive_notification_queue_backlog > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Notification delivery outbox backlog is high
          description: More than 100 pending or retryable outbox rows for 15 minutes.

      - alert: NotificationDeliveryFailureRateHigh
        expr: |
          (
            sum(rate(synqdrive_notification_delivery_failed_total[15m]))
            /
            clamp_min(
              sum(rate(synqdrive_notification_delivery_sent_total[15m]))
              + sum(rate(synqdrive_notification_delivery_failed_total[15m])),
              0.001
            )
          ) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Notification delivery failure rate elevated
          description: More than 20% of delivery attempts are failing.

      - alert: NotificationDeliveryWorkerStalled
        expr: |
          synqdrive_notification_queue_backlog > 10
          and increase(synqdrive_notification_delivery_sent_total[30m]) == 0
        for: 20m
        labels:
          severity: critical
        annotations:
          summary: Notification delivery worker appears stalled
          description: Outbox backlog exists but no successful deliveries in 30 minutes.

      - alert: NotificationOpenAgeHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, severity) (rate(synqdrive_notification_open_age_seconds_bucket[1h]))
          ) > 86400
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Open notifications unusually old
          description: P95 open notification age exceeds 24 hours.

      - alert: NotificationDuplicateConstraintViolations
        expr: increase(synqdrive_notification_duplicate_constraint_violation_total[1h]) > 50
        for: 10m
        labels:
          severity: info
        annotations:
          summary: Elevated notification idempotency collisions
          description: Many duplicate outbox idempotency key violations in the last hour.

      - alert: NotificationEvaluationRunsMissing
        expr: |
          increase(synqdrive_notifications_created_total[6h]) == 0
          and increase(synqdrive_notifications_updated_total[6h]) == 0
          and synqdrive_worker_runtime_enabled == 1
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: No notification materialization activity
          description: No created/updated notifications in 6h while workers are enabled — check evaluation scheduler.

  - name: synqdrive_payments
    rules:
      - alert: ConnectWebhookBacklogHigh
        expr: |
          sum(synqdrive_payment_connect_webhook_backlog{status=~"RECEIVED|FAILED"}) > 25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Stripe Connect webhook backlog is high
          description: More than 25 Connect webhook events are pending RECEIVED/FAILED processing.

      - alert: PaymentReconciliationMismatch
        expr: increase(synqdrive_payment_reconciliation_mismatch_total[30m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Payment reconciliation integrity mismatch detected
          description: Periodic reconciliation found ledger/invoice/booking mismatches — run audit-connect-payment-integrity.

      - alert: PaymentCheckoutFailureSpike
        expr: |
          rate(synqdrive_payment_checkout_creation_total{result="failure"}[15m]) > 0
          and rate(synqdrive_payment_checkout_creation_total{result="success"}[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Checkout creation failures without successes
          description: Stripe Connect checkout sessions are failing — check connected account readiness and Stripe status.

      - alert: PaymentEmailDeadLetter
        expr: synqdrive_payment_email_dead_letter > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Payment email dead-letter backlog
          description: Payment email outbox has dead-letter entries — inspect payment.email queue and outbox.

      - alert: UnknownConnectAccountWebhooks
        expr: increase(synqdrive_payment_unknown_connected_account_total[1h]) > 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: Connect webhooks with unresolved accounts
          description: Webhooks arrived for unknown connected accounts — verify Stripe Connect webhook endpoint and account mapping.

  - name: synqdrive_voice
    rules:
      - alert: VoiceWebhookSignatureFailures
        expr: increase(synqdrive_voice_webhook_signature_invalid_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Voice webhook signature validation failures
          description: Twilio or ElevenLabs webhook signatures failed — check auth tokens, proxy headers, and public URL configuration.

      - alert: VoiceWebhookDlqGrowing
        expr: increase(synqdrive_voice_webhook_dlq_total[30m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Voice webhook events entering DLQ
          description: Failed voice webhook processing is accumulating — inspect Master Control Plane webhooks tab and replay after root-cause fix.

      - alert: VoiceWebhookBacklogHigh
        expr: sum(synqdrive_voice_webhook_backlog{status=~"QUEUED|RECEIVED"}) > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Voice webhook processing backlog elevated
          description: Webhook queue backlog exceeds 50 events — check voice.webhook.process worker health and Redis connectivity.

      - alert: VoiceMcpErrorRateHigh
        expr: rate(synqdrive_voice_mcp_errors_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Voice MCP error rate elevated
          description: MCP gateway errors are spiking — verify token secret, rate limits, and tool availability.

      - alert: VoiceProtectionBlocksSpike
        expr: increase(synqdrive_voice_protection_blocks_total[1h]) > 25
        for: 15m
        labels:
          severity: info
        annotations:
          summary: Elevated voice protection blocks
          description: Budget, concurrency, or destination policy blocks increased — review org usage and abuse signals.

      - alert: VoiceWebhookQueueLagHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(synqdrive_voice_webhook_lag_seconds_bucket[15m]))
          ) > 120
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Voice webhook processing lag is high
          description: P95 webhook processing delay exceeds 120 seconds.

  - name: synqdrive_battery_v2
    rules:
      - alert: BatteryJobsFailingDespiteSnapshotSuccess
        expr: |
          rate(synqdrive_battery_jobs_failed_total[30m]) > 0
          and (
            rate(synqdrive_dimo_snapshot_poll_total{result="success"}[30m])
            /
            clamp_min(
              rate(synqdrive_dimo_snapshot_poll_total{result="success"}[30m])
              + rate(synqdrive_dimo_snapshot_poll_total{result="failure"}[30m]),
              0.001
            )
          ) > 0.9
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Battery V2 jobs failing while snapshots succeed
          description: Snapshot polls are healthy but Battery V2 job failures are occurring — inspect battery.v2 queue and job error codes.

      - alert: BatteryRestWakeContaminationHigh
        expr: |
          (
            sum(rate(synqdrive_battery_rest_measurements_total{quality="CONTAMINATED_BY_WAKE"}[30m]))
            /
            clamp_min(sum(rate(synqdrive_battery_rest_measurements_total[30m])), 0.001)
          ) > 0.35
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Elevated REST wake contamination share
          description: More than 35% of REST measurements are contaminated by wake events in the last 30 minutes.

      - alert: BatteryRestCaptureMissingDespiteWindows
        expr: |
          sum(increase(synqdrive_battery_rest_windows_total{outcome="opened"}[6h])) > 20
          and sum(increase(synqdrive_battery_rest_measurements_total{quality="VALID"}[6h])) == 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: No valid REST captures despite many rest windows
          description: Rest windows are opening but no VALID REST measurements were recorded in 6 hours.

      - alert: BatteryHvRechargeReconciliationFailing
        expr: |
          rate(synqdrive_battery_v2_hv_recharge_reconcile_errors_total[30m]) > 0
          or (
            rate(synqdrive_hv_recharge_segments_total{outcome="error"}[30m]) > 0
            and rate(synqdrive_hv_recharge_segments_total{outcome="success"}[30m]) == 0
          )
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: HV recharge reconciliation is failing
          description: Recharge reconcile errors or segment fetch failures without successes in the last 30 minutes.

      - alert: BatteryHvMethodDeviationUnusual
        expr: |
          (
            sum(rate(synqdrive_hv_capacity_method_conflict_total{outcome="conflict"}[6h]))
            /
            clamp_min(sum(rate(synqdrive_hv_capacity_method_conflict_total[6h])), 0.001)
          ) > 0.25
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: Unusual HV M2/M3 method deviation
          description: More than 25% of HV capacity validations report M2/M3 method conflict in the last 6 hours.

      - alert: BatteryProviderDuplicatePersistenceHigh
        expr: |
          (
            sum(rate(synqdrive_battery_provider_duplicate_total[1h]))
            /
            clamp_min(
              sum(rate(synqdrive_battery_provider_observation_total{outcome="NEW_OBSERVATION"}[1h]))
              + sum(rate(synqdrive_battery_provider_duplicate_total[1h])),
              0.001
            )
          ) > 0.5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Strong duplicate observation persistence
          description: More than half of provider observations are duplicates — check idempotency keys and snapshot dedup.

      - alert: BatteryV2DeadLetterJobsPresent
        expr: |
          synqdrive_battery_v2_dead_letter_backlog > 0
          or increase(synqdrive_battery_jobs_dead_letter_total[1h]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Battery V2 dead-letter jobs present
          description: Battery V2 jobs moved to dead-letter — inspect battery.v2 dead-letter backlog and error codes.

  - name: synqdrive_brakes
    rules:
      - alert: BrakeInitializationFailureRateHigh
        expr: |
          (
            rate(synqdrive_brake_initialization_failed_total[30m])
            /
            clamp_min(rate(synqdrive_brake_initialization_total[30m]), 0.001)
          ) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Brake baseline initialization failure rate elevated
          description: More than 20% of brake registration initializations are failing.

      - alert: BrakeRecalculationQueueBacklog
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(synqdrive_queue_lag_seconds_bucket{queue="dimo.brake.recalculation"}[10m])
            )
          ) > 600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Brake recalculation queue backlog is high
          description: P95 brake recalculation queue lag exceeds 10 minutes.

      - alert: BrakeRecalculationFailureRateHigh
        expr: |
          (
            rate(synqdrive_brake_recalculation_failed_total[30m])
            /
            clamp_min(rate(synqdrive_brake_recalculation_total[30m]), 0.001)
          ) > 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Brake recalculation failure rate elevated
          description: More than 15% of brake recalculations are failing.

      - alert: BrakeMissingTdiSpike
        expr: increase(synqdrive_brake_trip_missing_impact_total[1h]) > 50
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Spike in trips missing driving-impact data for brake modeling
          description: Many brake recalculations are missing TDI attribution — check driving-impact pipeline.

      - alert: BrakeTripOvercoverage
        expr: increase(synqdrive_brake_trip_overcoverage_total[1h]) > 10
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Brake modeling overcoverage incidents detected
          description: Trip distance exceeds odometer budget for brake wear modeling.

      - alert: BrakeEvidenceProcessingFailure
        expr: |
          rate(synqdrive_brake_evidence_duplicate_total[30m]) == 0
          and rate(synqdrive_brake_measurement_total[30m]) > 0
          and rate(synqdrive_brake_alert_total{action="created"}[30m]) == 0
          and increase(synqdrive_brake_recalculation_failed_total[30m]) > 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: Brake evidence pipeline may be failing downstream
          description: Measurements are recorded but recalculation failures persist without alert materialization.

      - alert: BrakeBackfillConflict
        expr: increase(synqdrive_brake_backfill_conflict_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Brake baseline backfill conflicts detected
          description: Backfill operations reported manual-review or conflict outcomes.

      - alert: BrakeHealthCurrentMissingAfterRegistration
        expr: |
          rate(synqdrive_brake_initialization_total{result="success"}[30m]) > 0
          and rate(synqdrive_brake_initialization_failed_total[30m]) > 0
          and rate(synqdrive_brake_recalculation_total{result="skipped"}[30m]) > 0
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Brake registration may not materialize BrakeHealthCurrent
          description: Initialization successes coexist with failures and skipped recalculations — audit registration pipeline.

  - name: synqdrive_connectivity
    rules:
      - alert: ConnectivityWebhookProcessingFailures
        expr: rate(synqdrive_connectivity_webhook_processing_failed_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Connectivity webhook processing failures
          description: Device connection webhook processing is failing — inspect DIMO webhook intake and workers.

      - alert: ConnectivityWebhookDeadLetterGrowth
        expr: increase(synqdrive_connectivity_webhook_dead_letter_total[30m]) > 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Connectivity webhook dead-letter growth
          description: Webhook events are landing in dead-letter — replay after fixing root cause.

      - alert: ConnectivityEpisodeFalseOpenDetected
        expr: increase(synqdrive_connectivity_episode_false_open_detected_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: False-open device connection episodes detected
          description: Reconciliation audit found episodes that should be resolved — run read-only audit before apply.

      - alert: ConnectivityStateConflict
        expr: rate(synqdrive_connectivity_state_conflict_total[15m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Connectivity runtime state conflicts
          description: Cross-surface or runtime builder reported state conflicts.

      - alert: ConnectivityReconciliationConflicts
        expr: increase(synqdrive_connectivity_reconciliation_conflict_total{classification="CONFLICTING_DATA"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Episode reconciliation conflicts
          description: Manual review required for conflicting episode reconciliation candidates.

      - alert: ConnectivityOpenEpisodesHigh
        expr: |
          increase(synqdrive_connectivity_episode_opened_total[24h])
          - increase(synqdrive_connectivity_episode_resolved_total[24h]) > 5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Unusually many open connectivity episodes
          description: Episode opens exceed resolutions over 24h — inspect fleet connectivity tab and reconciliation audit.

  - name: synqdrive_fleet_health_slo
    rules:
      - record: synqdrive:fleet_health:fleet_row_total
        expr: sum(synqdrive_fleet_health_availability_total)

      - record: synqdrive:fleet_health:battery_applicable_rows
        expr: sum(synqdrive_fleet_health_module_status_total{module="battery"})

      - record: synqdrive:fleet_health:ready_share
        expr: |
          sum(synqdrive_fleet_health_availability_total{level="ready"})
          / clamp_min(sum(synqdrive_fleet_health_availability_total), 1)

      - record: synqdrive:fleet_health:unavailable_share
        expr: |
          sum(synqdrive_fleet_health_availability_total{level="unavailable"})
          / clamp_min(sum(synqdrive_fleet_health_availability_total), 1)

      - record: synqdrive:fleet_health:unknown_module_share
        expr: |
          sum(synqdrive_fleet_health_module_status_total{state="unknown"})
          / clamp_min(sum(synqdrive_fleet_health_module_status_total), 1)

      - record: synqdrive:fleet_health:rental_health_request_p99_seconds
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, route) (
              rate(synqdrive_fleet_health_rental_health_request_duration_seconds_bucket[10m])
            )
          )

      - record: synqdrive:fleet_health:fleet_summary_p99_seconds
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, operation) (
              rate(synqdrive_fleet_health_fleet_summary_duration_seconds_bucket[10m])
            )
          )

  - name: synqdrive_fleet_health
    rules:
      - alert: FleetHealthUnavailableShareHigh
        expr: |
          synqdrive:fleet_health:fleet_row_total >= 10
          and synqdrive:fleet_health:unavailable_share > 0.20
        for: 20m
        labels:
          severity: critical
          owner: fleet-health-service
        annotations:
          summary: Fleet health unavailable share above 20%
          description: More than 20% of fleet health summary rows are unavailable for at least 20 minutes while the fleet snapshot has at least 10 vehicles.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthunavailablesharehigh
          clear_condition: unavailable share stays below 15% for 10m, or fleet_row_total drops below 10 (small-fleet guard).

      - alert: FleetHealthRentalRequestLatencyP99High
        expr: |
          synqdrive:fleet_health:rental_health_request_p99_seconds{route="fleet_page"} > 8
          and sum(rate(synqdrive_fleet_health_rental_health_request_duration_seconds_count{route="fleet_page"}[10m])) > 0.05
        for: 15m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Fleet health rental page latency p99 high
          description: Rental health fleet_page p99 exceeds 8s with sustained request volume — inspect module evaluators, cache, and DB load.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthrentalrequestlatencyp99high
          clear_condition: fleet_page p99 stays below 6s for 15m with non-trivial request rate.

      - alert: FleetHealthSummaryLatencyP99High
        expr: |
          synqdrive:fleet_health:fleet_summary_p99_seconds{operation="page"} > 10
          and sum(rate(synqdrive_fleet_health_fleet_summary_duration_seconds_count{operation="page"}[10m])) > 0.05
        for: 15m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Fleet health summary page latency p99 high
          description: Fleet summary page aggregation p99 exceeds 10s — inspect RentalHealthSummaryService and upstream module batching.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthsummarylatencyp99high
          clear_condition: page-operation p99 stays below 8s for 15m.

      - alert: FleetHealthBatteryPublicationCoverageLow
        expr: |
          synqdrive:fleet_health:battery_applicable_rows >= 5
          and synqdrive_fleet_health_battery_publication_coverage_ratio < 0.7
        for: 1h
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Battery publication coverage low in fleet health summaries
          description: Less than 70% of battery-applicable fleet rows have publication coverage while at least 5 battery rows are present.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthbatterypublicationcoveragelow
          clear_condition: coverage ratio stays at or above 0.75 for 30m, or battery_applicable_rows drops below 5.

      - alert: FleetHealthBatteryPublicationCoverageAbsent
        expr: |
          synqdrive:fleet_health:battery_applicable_rows >= 5
          and synqdrive_fleet_health_battery_publication_coverage_ratio < 0.1
        for: 30m
        labels:
          severity: critical
          owner: fleet-health-service
        annotations:
          summary: Battery publications effectively absent in fleet health
          description: Battery publication coverage collapsed below 10% with a meaningful battery fleet — publications may have stopped flowing.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthbatterypublicationcoverageabsent
          clear_condition: coverage ratio recovers above 0.5 for 20m.

      - alert: FleetHealthPartialRefreshFailuresSustained
        expr: |
          synqdrive:fleet_health:fleet_row_total >= 10
          and increase(synqdrive_fleet_health_refresh_partial_failure_total[30m]) >= 3
        for: 15m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Sustained fleet health partial refresh failures
          description: Fleet summary batch returned degraded rows at least three times in 30 minutes — check upstream health modules and safe fallbacks.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthpartialrefreshfailuressustained
          clear_condition: no new partial refresh failures for 30m.

      - alert: FleetHealthTaskApiErrorsSustained
        expr: increase(synqdrive_fleet_health_task_api_errors_total[15m]) >= 3
        for: 10m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Sustained fleet health task API errors
          description: Task list/summary failed at least three times in 15 minutes for fleet health surfaces.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthtaskapierrorssustained
          clear_condition: fewer than 2 task API errors in the trailing 15m window.

      - alert: FleetHealthCaseApiErrorsSustained
        expr: increase(synqdrive_fleet_health_case_api_errors_total[15m]) >= 3
        for: 10m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Sustained fleet health service case API errors
          description: Service case list failed at least three times in 15 minutes for fleet health surfaces.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthcaseapierrorssustained
          clear_condition: fewer than 2 case API errors in the trailing 15m window.

      - alert: FleetHealthVendorApiErrorsSustained
        expr: increase(synqdrive_fleet_health_vendor_api_errors_total[15m]) >= 3
        for: 10m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Sustained fleet health vendor API errors
          description: Vendor list/stats failed at least three times in 15 minutes for fleet health surfaces.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthvendorapierrorssustained
          clear_condition: fewer than 2 vendor API errors in the trailing 15m window.

      - alert: FleetHealthUnknownModuleShareHigh
        expr: |
          synqdrive:fleet_health:fleet_row_total >= 10
          and sum(synqdrive_fleet_health_module_status_total{state="unknown"}) >= 5
          and synqdrive:fleet_health:unknown_module_share > 0.25
        for: 30m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Unusually high unknown module share in fleet health
          description: More than 25% of module status samples are unknown with at least 5 unknown cells and a fleet snapshot of 10+ vehicles.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthunknownmodulesharehigh
          clear_condition: unknown share stays below 20% for 30m, or unknown cell count drops below 3.

      - alert: FleetHealthTaskAutomationEnqueueFailures
        expr: |
          increase(synqdrive_task_automation_outbox_failed_total[30m]) >= 5
          or (
            synqdrive_task_automation_outbox_backlog > 10
            and increase(synqdrive_task_automation_outbox_failed_total[1h]) >= 2
          )
        for: 15m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Task automation outbox enqueue/processing failures elevated
          description: Task materialization outbox failures or backlog are elevated — service tasks and health bridges may not materialize.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthtaskautomationenqueuefailures
          clear_condition: fewer than 2 outbox failures in 30m and backlog below 5.

      - alert: FleetHealthBlockingCasesBacklogHigh
        expr: |
          synqdrive:fleet_health:fleet_row_total >= 15
          and synqdrive_fleet_health_blocking_service_case_total >= 5
          and delta(synqdrive_fleet_health_blocking_service_case_total[24h]) >= 0
        for: 6h
        labels:
          severity: info
          owner: fleet-health-service
        annotations:
          summary: Blocking service cases not clearing over 24h
          description: At least five rental-blocking service cases persist without net reduction over 24 hours on a fleet of 15+ vehicles — review operational closure, not only platform health.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthblockingcasesbackloghigh
          clear_condition: blocking case count drops below 3, or net 24h delta becomes negative.

      - alert: FleetHealthQueueFailedJobsElevated
        expr: |
          sum(synqdrive_queue_failed_jobs) >= 5
          and sum(synqdrive_queue_failed_jobs) > 0.02 * synqdrive:fleet_health:fleet_row_total
        for: 30m
        labels:
          severity: warning
          owner: fleet-health-service
        annotations:
          summary: Queue failed jobs elevated relative to fleet size
          description: BullMQ failed jobs are at least 5 and exceed 2% of the current fleet health row count — inspect queues feeding health/task materialization.
          runbook_url: docs/runbooks/fleet-health-service-readiness.md#fleethealthqueuefailedjobselevated
          clear_condition: failed jobs total below 3 for 30m, or ratio drops below 1% of fleet rows.

  - name: synqdrive_iam
    rules:
      - alert: IamAuditOutboxDeadLetter
        expr: increase(iam_audit_dead_letter_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          owner: iam
        annotations:
          summary: IAM audit outbox dead-letter events detected
          description: At least one IAM audit outbox event moved to dead letter in the last 15 minutes — critical access changes may lack durable audit records.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#audit-outbox-dlq
          clear_condition: no new dead-letter increments for 30m and backlog processed.

      - alert: IamAuditOutboxRetrySustained
        expr: increase(iam_audit_outbox_failed_total[30m]) >= 5
        for: 10m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: IAM audit outbox retries sustained
          description: IAM audit outbox processing failures are retrying repeatedly — inspect worker health and outbox backlog.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#audit-outbox-dlq
          clear_condition: retry rate below 1 per 30m for 30m.

      - alert: IamSeedAdminEnabledInProduction
        expr: iam_seed_admin_enabled == 1
        for: 1m
        labels:
          severity: critical
          owner: iam
        annotations:
          summary: Seed-admin bootstrap endpoint is enabled
          description: ENABLE_SEED_ADMIN=true — disable immediately in production after bootstrap.
          runbook_url: docs/runbooks/iam-production-rollout.md#seed-admin
          clear_condition: iam_seed_admin_enabled == 0 for 5m.

      - alert: IamSessionReuseDetected
        expr: increase(iam_session_reuse_detected_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: Refresh token reuse detected
          description: At least one refresh-token reuse was detected and the token family was revoked — possible token theft or client double-refresh bug.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#refresh-reuse
          clear_condition: no reuse detections for 1h.

      - alert: IamPrivilegedChangesSpike
        expr: |
          (
            increase(iam_role_change_total[1h])
            + increase(iam_permission_change_total[1h])
            + increase(iam_membership_lifecycle_total{outcome="success"}[1h])
          ) > 50
        for: 15m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: Unusually high IAM privileged change volume
          description: More than 50 role/permission/membership changes in one hour — verify authorized administrative activity.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#privileged-change-spike
          clear_condition: combined hourly increase below 20 for 1h.

      - alert: IamOrganizationWithoutAdmin
        expr: iam_organizations_without_admin_total > 0
        for: 15m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: Organization without active ORG_ADMIN
          description: At least one non-archived organization has zero active ORG_ADMIN memberships.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#org-without-admin
          clear_condition: gauge returns to 0.

      - alert: IamInviteDeliveryFailures
        expr: increase(iam_invite_delivery_failed_total[30m]) >= 3
        for: 10m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: Invite email delivery failures sustained
          description: Three or more invite delivery failures in 30 minutes — check Resend/SMTP and invite outbox.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#invite-delivery
          clear_condition: no delivery failures for 30m.

      - alert: IamCrossTenantDenialsElevated
        expr: increase(iam_cross_tenant_denial_total[15m]) >= 10
        for: 10m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: Elevated cross-tenant access denials
          description: Ten or more cross-tenant denials in 15 minutes — may indicate IDOR probing or client misconfiguration.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#cross-tenant-denials
          clear_condition: denial rate below 3 per 15m for 30m.

      - alert: IamAccessReviewOverdue
        expr: iam_access_review_overdue_total > 0
        for: 1h
        labels:
          severity: info
          owner: iam
        annotations:
          summary: Overdue IAM access review campaigns
          description: Active access review campaigns are past their due date.
          runbook_url: docs/runbooks/iam-incident-and-access-revocation.md#access-reviews
          clear_condition: overdue gauge returns to 0.

      - alert: IamRetentionJobFailures
        expr: increase(iam_retention_job_failed_total[1h]) > 0
        for: 15m
        labels:
          severity: warning
          owner: iam
        annotations:
          summary: IAM retention job phase failures
          description: IAM data retention worker reported phase failures — review legal holds and retention config before enabling mutations.
          runbook_url: docs/runbooks/iam-data-retention-and-user-rights.md
          clear_condition: no retention failures for 2h.

  - name: synqdrive_data_auth
    rules:
      - alert: DataAuthAuditOutboxDeadLetter
        expr: increase(data_auth_audit_dead_letter_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          owner: data-auth
        annotations:
          summary: Data authorization audit outbox dead-letter events detected
          description: At least one data-auth audit outbox event moved to dead letter in the last 15 minutes — authorization decisions may lack durable audit records.
          runbook_url: docs/runbooks/data-authorization-incidents.md#audit-outbox-dlq
          clear_condition: no new dead-letter increments for 30m and backlog processed.

      - alert: DataAuthAuditOutboxRetrySustained
        expr: increase(data_auth_audit_outbox_failed_total[30m]) >= 5
        for: 10m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Data authorization audit outbox retries sustained
          description: Data-auth audit outbox processing failures are retrying repeatedly — inspect worker health and outbox backlog.
          runbook_url: docs/runbooks/data-authorization-incidents.md#audit-outbox-dlq
          clear_condition: retry rate below 1 per 30m for 30m.

      - alert: DataAuthDevBypassEnabledInProduction
        expr: data_auth_dev_bypass_enabled == 1
        for: 1m
        labels:
          severity: critical
          owner: data-auth
        annotations:
          summary: Data authorization development bypass is enabled
          description: DATA_AUTH_DECISION_DEV_BYPASS=true — disable immediately in production (fail-closed required).
          runbook_url: docs/runbooks/data-authorization-production-rollout.md#dev-bypass
          clear_condition: data_auth_dev_bypass_enabled == 0 for 5m.

      - alert: DataAuthEnforcementDisabledInProduction
        expr: data_auth_enforcement_disabled == 1
        for: 1m
        labels:
          severity: critical
          owner: data-auth
        annotations:
          summary: Data authorization enforcement is disabled
          description: DATA_AUTH_DECISION_ENFORCEMENT_ENABLED=false — protected data paths may be unenforced.
          runbook_url: docs/runbooks/data-authorization-production-rollout.md#enforcement-disabled
          clear_condition: data_auth_enforcement_disabled == 0 for 5m.

      - alert: DataAuthGlobalDenySwitchActive
        expr: data_auth_global_deny_switch_enabled == 1
        for: 5m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Global data authorization deny switch active
          description: DATA_AUTH_DECISION_GLOBAL_DENY=true — all protected access is denied until cleared.
          runbook_url: docs/runbooks/data-authorization-incidents.md#global-deny
          clear_condition: data_auth_global_deny_switch_enabled == 0 for 10m.

      - alert: DataAuthResolverErrorsElevated
        expr: increase(data_auth_resolver_error_total[15m]) >= 10
        for: 10m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Elevated policy resolver errors
          description: Ten or more resolver errors in 15 minutes — inspect PostgreSQL health and policy resolver queries.
          runbook_url: docs/runbooks/data-authorization-incidents.md#resolver-errors
          clear_condition: resolver error rate below 3 per 15m for 30m.

      - alert: DataAuthDenyRateSpike
        expr: |
          (
            sum(rate(data_auth_decision_total{decision="DENY"}[15m]))
            /
            clamp_min(sum(rate(data_auth_decision_total[15m])), 0.001)
          ) > 0.5
          and sum(increase(data_auth_decision_total[15m])) > 20
        for: 15m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Authorization deny rate above 50%
          description: More than half of authorization decisions are DENY with meaningful volume — verify policy lifecycle and deny-switch state.
          runbook_url: docs/runbooks/data-authorization-incidents.md#deny-spike
          clear_condition: deny ratio below 30% for 30m.

      - alert: DataAuthDecisionLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(data_auth_decision_latency_seconds_bucket[10m])) by (le)) > 1
        for: 15m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Authorization decision p95 latency above 1s
          description: Decision engine p95 latency exceeds 1 second — check resolver load, cache size, and database performance.
          runbook_url: docs/runbooks/data-authorization-incidents.md#decision-latency
          clear_condition: p95 below 500ms for 30m.

      - alert: DataAuthUnregisteredProductivePaths
        expr: data_auth_unregistered_path_total > 0
        for: 15m
        labels:
          severity: critical
          owner: data-auth
        annotations:
          summary: Unregistered productive data paths detected
          description: Enforcement coverage registry reports productive processing paths without registered enforcement — block release until catalog is updated.
          runbook_url: docs/runbooks/data-authorization-incidents.md#unregistered-paths
          clear_condition: gauge returns to 0.

      - alert: DataAuthWorkerVersionMismatch
        expr: data_auth_worker_version_mismatch == 1
        for: 10m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Worker policy engine version mismatch
          description: At least one worker reports a policy engine version different from the expected WORKER_POLICY_ENGINE_VERSION.
          runbook_url: docs/runbooks/data-authorization-incidents.md#worker-version
          clear_condition: gauge returns to 0 for 15m.

      - alert: DataAuthRevocationFailed
        expr: increase(data_auth_revocation_failed_total[30m]) > 0
        for: 10m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Revocation workflow terminal failures
          description: One or more revocation workflows reached REVOCATION_FAILED — inspect step errors and provider revocation.
          runbook_url: docs/runbooks/data-authorization-incidents.md#revocation-failed
          clear_condition: no new revocation failures for 1h.

      - alert: DataAuthRevocationInProgressElevated
        expr: data_auth_revocation_in_progress_total > 10
        for: 30m
        labels:
          severity: info
          owner: data-auth
        annotations:
          summary: Elevated revocations in progress
          description: More than ten revocation workflows are in non-terminal states for 30 minutes — verify orchestrator progress.
          runbook_url: docs/runbooks/data-authorization-incidents.md#revocation-in-progress
          clear_condition: gauge below 5 for 30m.

      - alert: DataAuthOverdueReviews
        expr: data_auth_overdue_review_total > 0
        for: 1h
        labels:
          severity: info
          owner: data-auth
        annotations:
          summary: Overdue processing activity reviews
          description: Processing activities are past nextReviewDate — schedule review workflow.
          runbook_url: docs/runbooks/data-authorization-incidents.md#overdue-reviews
          clear_condition: gauge returns to 0.

      - alert: DataAuthOverdueDpia
        expr: data_auth_overdue_dpia_total > 0
        for: 1h
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Overdue DPIA reviews required
          description: Processing activities require DPIA review — activation may be blocked.
          runbook_url: docs/runbooks/data-authorization-incidents.md#overdue-dpia
          clear_condition: gauge returns to 0.

      - alert: DataAuthExpiredPolicies
        expr: data_auth_expired_policy_total > 0
        for: 30m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Active policies past validUntil
          description: Enforcement policies are past validUntil but still ACTIVE — verify expiry scheduler.
          runbook_url: docs/runbooks/data-authorization-incidents.md#expired-policies
          clear_condition: gauge returns to 0.

      - alert: DataAuthRetentionJobFailures
        expr: increase(data_auth_retention_error_total[1h]) > 0
        for: 15m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Data retention deletion job failures
          description: Retention deletion jobs reported partial failures — review legal holds before retry.
          runbook_url: docs/runbooks/data-authorization-incidents.md#retention-failures
          clear_condition: no retention failures for 2h.

      - alert: DataAuthDenySwitchPropagationSlow
        expr: histogram_quantile(0.95, sum(rate(data_auth_deny_switch_propagation_latency_seconds_bucket[10m])) by (le)) > 2
        for: 15m
        labels:
          severity: warning
          owner: data-auth
        annotations:
          summary: Deny-switch propagation p95 above 2s
          description: Cross-instance deny-switch propagation exceeds the 2s target — inspect Redis pub/sub and reconciliation loop.
          runbook_url: docs/runbooks/data-authorization-incidents.md#deny-switch-propagation
          clear_condition: p95 below 1s for 30m.

