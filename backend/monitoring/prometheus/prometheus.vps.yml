# SynqDrive Prometheus — VPS (PM2 backend on host port 3001)
#
# Used by backend/scripts/ops/vps-setup-prometheus.sh
# Scrapes localhost only — never expose /metrics publicly.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: synqdrive-backend
    metrics_path: /api/v1/metrics
    scheme: http
    scrape_interval: 30s
    static_configs:
      - targets:
          - '127.0.0.1:3001'
    bearer_token_file: /etc/prometheus/secrets/metrics_bearer_token
