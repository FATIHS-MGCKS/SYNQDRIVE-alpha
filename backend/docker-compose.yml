services:
  postgres:
    image: postgres:16-alpine
    container_name: synqdrive-postgres
    logging: &docker_log_limits
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: synqdrive
      POSTGRES_PASSWORD: synqdrive
      POSTGRES_DB: synqdrive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U synqdrive']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synqdrive-redis
    logging: *docker_log_limits
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional analytics / telemetry mirror. PostgreSQL stays the canonical truth;
  # ClickHouse only powers analytics/data-analyse/telemetry and may be down
  # without blocking operational SynqDrive logic.
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: synqdrive-clickhouse
    logging: *docker_log_limits
    ports:
      # Bind to localhost only — never expose ClickHouse publicly.
      - '127.0.0.1:8123:8123'
      - '127.0.0.1:9000:9000'
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-synqdrive}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-synqdrive}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-synqdrive_clickhouse_dev}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: '1'
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./storage/clickhouse/backups:/backups
      - ./docker/clickhouse/config.d/backup_disk.xml:/etc/clickhouse-server/config.d/backup_disk.xml:ro
      - ./docker/clickhouse/config.d/01_logger.xml:/etc/clickhouse-server/config.d/01_logger.xml:ro
      - ./docker/clickhouse/config.d/z_system_logs.xml:/etc/clickhouse-server/config.d/z_system_logs.xml:ro
      - ./docker/clickhouse/users.d/z_log_profiles.xml:/etc/clickhouse-server/users.d/z_log_profiles.xml:ro
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'clickhouse-client --user $$CLICKHOUSE_USER --password $$CLICKHOUSE_PASSWORD --query "SELECT 1" || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional monitoring profile — NOT started by `npm run infra:up`.
  #   docker compose --profile monitoring up -d prometheus
  # Create bearer token file first:
  #   mkdir -p monitoring/prometheus/secrets
  #   echo -n "$METRICS_BEARER_TOKEN" > monitoring/prometheus/secrets/metrics_bearer_token
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.54.1
    container_name: synqdrive-prometheus
    logging: *docker_log_limits
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml.example:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./monitoring/prometheus/secrets:/etc/prometheus/secrets:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    extra_hosts:
      - 'backend:host-gateway'

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  clickhouse_logs:
